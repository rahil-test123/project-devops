name: DevOps CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt

      - name: Run tests
        run: |
          cd app
          pytest test_app.py

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t rahil0212/devops-api:latest .

      - name: Push Docker image
        run: docker push rahil0212/devops-api:latest

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          cd terraform
          terraform init

      - name: Terraform Validate
        run: |
          cd terraform
          terraform validate

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Copy Kubernetes manifests
        run: |
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa -r k8s ubuntu@${{ secrets.MASTER_IP }}:/home/ubuntu/

      - name: Deploy to Kubernetes
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ubuntu@${{ secrets.MASTER_IP }} << 'EOF'
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
            sudo kubectl apply -f /home/ubuntu/k8s/
            sudo kubectl rollout restart deployment devops-api
          EOF