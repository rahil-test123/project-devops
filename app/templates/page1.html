<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SoundWave App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
html{scroll-behavior:smooth;}
body{
    background: radial-gradient(circle at top left,#0f2027 0%,#203a43 50%,#2c5364 100%);
    color:white;
    overflow-x:hidden;
    padding-bottom:100px;
}


.search-container{
    display:flex;
    justify-content:center;
    padding:30px 20px 10px;
}
.search-bar{
    width:400px;
    max-width:90%;
    padding:14px 20px;
    border-radius:40px;
    border:none;
    outline:none;
    font-size:16px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    color:white;
    transition:0.3s;
}
.search-bar::placeholder{
    color:rgba(255,255,255,0.6);
}
.search-bar:focus{
    background:rgba(255,255,255,0.15);
    box-shadow:0 0 15px rgba(255,0,128,0.3);
}


.hero{
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    padding:40px 20px 40px;
}
.hero h1{
    font-size:48px;
    font-weight:900;
    background:linear-gradient(45deg,#ff0080,#7928ca);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    margin-bottom:20px;
}
.hero p{
    font-size:18px;
    opacity:0.8;
    margin-bottom:40px;
    max-width:600px;
}


.section-container{
    max-width:1100px;
    margin:0 auto;
    padding:40px 20px;
}
.section-title{
    font-size:28px;
    font-weight:700;
    margin-bottom:30px;
}
.cards{
    display:flex;
    flex-wrap:wrap;
    gap:30px;
    justify-content:center;
}
.card{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(15px);
    border-radius:20px;
    width:220px;
    padding:20px;
    transition:0.4s;
    cursor:pointer;
    text-align:center;
}
.card:hover{
    transform:translateY(-10px);
    box-shadow:0 15px 40px rgba(0,0,0,0.5);
}
.card img{
    width:180px;
    height:180px;
    border-radius:20px;
    object-fit:cover;
    margin-bottom:15px;
}
.card h4{
    font-size:18px;
    margin-bottom:10px;
}
.card p{
    font-size:14px;
    opacity:0.8;
    margin-bottom:10px;
}


.play-btn{
    width:50px;
    height:50px;
    border-radius:50%;
    border:none;
    background:linear-gradient(45deg,#ff0080,#7928ca);
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0 auto;
    cursor:pointer;
    transition:0.3s;
}
.play-btn:hover{
    transform:scale(1.1);
}
.play-btn svg{
    width:18px;
    height:18px;
    fill:white;
}


.player-bar{
    position:fixed;
    bottom:0;
    width:100%;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(20px);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    z-index:10;
}
.track-info{
    display:flex;
    align-items:center;
    gap:15px;
}
.track-info img{
    width:50px;
    height:50px;
    border-radius:10px;
    object-fit:cover;
}
.track-details h4{
    font-size:16px;
    font-weight:700;
}
.track-details p{
    font-size:14px;
    opacity:0.8;
    margin-top:5px;
}
.wave-container{
    display:flex;
    align-items:flex-end;
    gap:3px;
    margin-top:5px;
    height:10px;
}
.wave{
    width:4px;
    background:linear-gradient(#ff0080,#7928ca);
    animation:wave 1s infinite ease-in-out;
    border-radius:2px;
}
.wave:nth-child(1){animation-delay:0s;}
.wave:nth-child(2){animation-delay:0.1s;}
.wave:nth-child(3){animation-delay:0.2s;}
.wave:nth-child(4){animation-delay:0.3s;}
.wave:nth-child(5){animation-delay:0.4s;}
@keyframes wave{
    0%,100%{height:3px;}
    50%{height:10px;}
}


.player-controls button{
    background:none;
    border:none;
    color:white;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>
<body>


<div class="search-container">
    <input id="search-input" type="text" class="search-bar" placeholder="Search for songs, artists, playlists...">
</div>

<section class="hero">
  <h1>Welcome to SoundWave</h1>
  <p>Discover your favorite tracks, stream playlists, and vibe with the music you love anywhere, anytime.</p>
</section>


<section class="section-container">
  <div class="section-title">Recommended Playlists</div>
  <div class="cards" id="playlists-container"></div>
</section>


<section class="section-container">
  <div class="section-title">Recommended Albums</div>
  <div class="cards" id="albums-container"></div>
</section>


<section class="section-container">
  <div class="section-title">Recommended Songs</div>
  <div class="cards" id="songs-container"></div>
</section>


<div class="player-bar">
  <div class="track-info">
    <img id="player-img" src="" style="display:none;">
    <div class="track-details">
      <h4 id="player-title">Nothing Playing</h4>
      <div class="wave-container" id="player-waves" style="display:none;">
        <div class="wave"></div>
        <div class="wave"></div>
        <div class="wave"></div>
        <div class="wave"></div>
        <div class="wave"></div>
      </div>
      <p id="first-song"></p>
    </div>
  </div>
  <div class="player-controls">
    <button>&#9664;</button>
    <button>&#9654;</button>
    <button>&#10074;&#10074;</button>
  </div>
</div>

<audio id="audio-player" controls style="display:none;"></audio>

<script>
const playlistsContainer = document.getElementById("playlists-container");
const albumsContainer = document.getElementById("albums-container");
const songsContainer = document.getElementById("songs-container");
const searchInput = document.getElementById("search-input");
const audioPlayer = document.getElementById("audio-player");

function buildCard(item, category) {
    const card = document.createElement("div");
    card.className = "card";

    let subtitle = "";
    if (category === "playlists") {
        subtitle = "";
    } else if (category === "albums") {
        subtitle = `<p>${item.artist}</p>`;
    } else if (category === "songs") {
        subtitle = `<p>${item.artist}</p>`;
    }

    card.innerHTML = `
      <img src="${item.cover}">
      <h4>${item.title}</h4>
      ${subtitle}
      <button class="play-btn" data-category="${category}" data-id="${item.id}">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
    `;

    const button = card.querySelector(".play-btn");
    button.addEventListener("click", () => loadPlayerItem(category, item.id));

    return card;
}

function renderSection(container, items, category) {
    container.innerHTML = "";
    items.forEach(item => {
        container.appendChild(buildCard(item, category));
    });
}

async function loadInitialData() {
    try {
        const [playlistsRes, albumsRes, songsRes] = await Promise.all([
            fetch("/api/playlists"),
            fetch("/api/albums"),
            fetch("/api/songs")
        ]);

        const playlists = await playlistsRes.json();
        const albums = await albumsRes.json();
        const songs = await songsRes.json();

        renderSection(playlistsContainer, playlists, "playlists");
        renderSection(albumsContainer, albums, "albums");
        renderSection(songsContainer, songs, "songs");
    } catch (error) {
        console.error("Error loading data:", error);
    }
}

let currentPlaying = {
    category: null,
    id: null
};

async function loadPlayerItem(category, id) {
    try {
        
        if (
             currentPlaying.category === category &&
             currentPlaying.id === id
        ) {
          const button = document.querySelector(
         `[data-category="${category}"][data-id="${id}"]`
          );

          if (!audioPlayer.paused) {
           audioPlayer.pause();
           button.innerHTML = "▶";
          } else {
            audioPlayer.play();
             button.innerHTML = "⏸";
            }
         return;
         }
    
        const response = await fetch(`/api/player/${category}/${id}`);
        const data = await response.json();

        document.getElementById("player-title").innerText = data.title;
        document.getElementById("player-img").src = data.cover;
        document.getElementById("player-img").style.display = "block";
        document.getElementById("first-song").innerText = data.subtitle;
        document.getElementById("player-waves").style.display = "flex";

        if (data.audio_url) {
            audioPlayer.src = data.audio_url;
            audioPlayer.style.display = "block";
            audioPlayer.load();
            await audioPlayer.play();

           
            currentPlaying.category = category;
            currentPlaying.id = id;
        }

    } catch (error) {
        console.error("Error loading player item:", error);
    }
}
searchInput.addEventListener("input", (e) => {
    runSearch(e.target.value.trim());
});

loadInitialData();
</script>

</body>
</html>
